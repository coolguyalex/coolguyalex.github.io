<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Guestbook | goblinoid.com</title>
  <style>
    body {
      font-family: monospace;
      background: #f2f2f2;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      border-bottom: 2px solid black;
      padding-bottom: 5px;
    }

    input, textarea, button {
      font-family: monospace;
      width: 100%;
      margin-bottom: 12px;
      padding: 6px;
      border: 1px solid black;
      background: white;
    }

    button {
      width: auto;
      cursor: pointer;
    }

    .entry {
      border-top: 1px solid black;
      padding: 12px 0;
    }

    .meta {
      font-size: 0.85em;
    }

    .honeypot {
      display: none;
    }
  </style>
</head>
<body>

<h1>~ Sign the Guestbook ~</h1>

<p>Leave a mark in the dungeon log.</p>

<form action="https://formspree.io/f/YOUR_ID" method="POST">

  <!-- Honeypot field (bots fill this, humans don’t see it) -->
  <div class="honeypot">
    <label>Leave this empty</label>
    <input type="text" name="_gotcha">
  </div>

  <label>Name:</label>
  <input type="text" name="name" required>

  <label>Message:</label>
  <textarea name="message" rows="5" required></textarea>

  <!-- Optional: redirect after submission -->
  <input type="hidden" name="_next" value="https://goblinoid.com/thanks.html">

  <button type="submit">Sign Guestbook</button>

</form>

<h2>Entries</h2>

<div class="entry">
  <strong>Alexander</strong>
  <div class="meta">February 2026</div>
  <div>The dungeon is open.</div>
</div>

</body>
</html>
